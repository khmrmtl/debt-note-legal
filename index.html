<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Debt Note — Legal</title>
<meta name="description" content="Privacy Policy and Terms of Use for Debt Note: Debt Tracker & IOU App.">
<style>
  :root {
    --primary: #1D9E75;
    --primary-dark: #0F6E56;
    --primary-light: #E1F5EE;
    --text: #1a1a1a;
    --muted: #5a5a5a;
    --border: #e6e6e6;
    --bg: #ffffff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #f0f0f0;
      --muted: #a8a8a8;
      --border: #2a2a2a;
      --bg: #0f0f0f;
      --primary: #2BB58A;
      --primary-light: #143a30;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 17px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  .eyebrow {
    color: var(--primary);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 8px;
  }
  h1 {
    font-size: 32px;
    line-height: 1.2;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  p { color: var(--muted); margin: 0 0 32px; }
  .links {
    display: grid;
    gap: 12px;
  }
  .links a {
    display: block;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s;
  }
  .links a:hover {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .links a span {
    display: block;
    font-size: 14px;
    color: var(--muted);
    font-weight: 400;
    margin-top: 2px;
  }
  footer {
    margin-top: 48px;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Debt Note</p>
  <h1>Legal</h1>
  <p>Privacy and terms documents for the Debt Note mobile app.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy<span>How Debt Note handles your data</span></a>
    <a href="terms.html">Terms of Use<span>Rules for using the app</span></a>
  </div>
  <footer>&copy; 2026 Khmer Motal &middot; Baguio City, Philippines</footer>
</div>
</body>
</html>
